# tdz_config.yaml
# Canonical example configuration for the touchdown-point-detection pipeline.
# Values match the design "Configuration Schema". All numeric values are SI per
# the Units Convention; explicit unit suffixes are preserved in the keys.
pipeline:
  master_random_seed: 42
  ads_b_source: "aireon"            # "aireon" | "fr24"

timebase:
  strategy: "common_grid"           # "common_grid" | "continuous_time"
  grid_interval_s: 1.0
  interpolation_method: "kinematic" # "kinematic" | "linear"

signals:
  smoothing_method: "savgol"        # "savgol" | "gp"
  savgol_window_samples: 7
  savgol_poly_order: 3
  gp_length_scale_s: 8.0
  gp_noise_variance: 0.5

estimators:
  enabled:
    - "decel_knee"
    - "flare_crossing"
    - "imm_rts"
    - "jerk_onset"
    - "pelt"
    - "lightgbm"
    - "sequence_model"
  physics_fallback_threshold: 50    # Min QAR-labeled flights per type for learned

fusion:
  method: "stacking"                # "stacking" | "weighted_blend"
  confidence_threshold_sigma: 5.0   # Exclude estimator if sigma_t exceeds this (seconds)
  low_confidence_ci_width_ft: 600   # Flag if mapped distance 90% CI width exceeds this (feet)
  low_confidence_ci_width_s: 8.0    # Time-domain analog: flag if fused 90% CI width exceeds this (seconds)
  disagreement_threshold_s: 3.0     # Flag ESTIMATOR_DISAGREEMENT if inter-estimator spread (1-sigma) exceeds this (seconds)

uncertainty:
  # Uncertainty quantification and calibration (Task 19; Req 4.x, 9.2, 9.6).
  coverage_target: 0.90              # Target empirical coverage for the reported 90% CIs (conformalized to 85–95%)
  nominal_cadence_s: 5.0             # Nominal ADS-B sample interval C used for gap-proportional widening (Req 9.2)
  gap_window_half_width_s: 30.0      # Only gaps within ±this window of t_td widen the interval (Req 9.2)
  gap_min_duration_s: 10.0           # Only gaps exceeding this duration trigger widening (Req 9.2)
  missing_lever_arm_widening_factor: 1.5   # Distance-CI widening when a class-median lever arm was substituted (Req 7.5)
  post_transition_window_s: 15.0     # Window after the on-ground transition to look for ground-roll samples (Req 9.6)
  min_post_transition_samples: 2     # Fewer than this many valid post-transition position samples -> starvation widening (Req 9.6)
  starvation_widening_factor: 1.5    # CI widening applied on post-transition sample starvation (Req 9.6)

quality_gates:
  min_samples_near_td: 3
  max_gap_spanning_td_s: 15
  min_samples_in_window: 3
  window_half_width_s: 30
  max_excluded_fraction: 0.5
  max_longitudinal_accel_g: 1.0
  max_lateral_accel_g: 0.5
  max_turn_rate_deg_s: 6.0
  duplicate_timestamp_tolerance_s: 0.1

lever_arms:
  # Per ICAO type designator; pitch is assumed (not observable in ADS-B)
  B738:
    vertical_offset_m: 4.2
    longitudinal_offset_m: 12.5
    nominal_touchdown_pitch_deg: 5.5
    aircraft_class: "narrowbody"
  B77W:
    vertical_offset_m: 5.8
    longitudinal_offset_m: 18.0
    nominal_touchdown_pitch_deg: 4.5
    aircraft_class: "widebody"
  # ... additional types
  default_strategy: "class_median"  # Missing type -> median of its aircraft_class (NOT worst-case)
  class_medians:                    # Used when a type-specific entry is absent
    regional:   { vertical_offset_m: 3.2, longitudinal_offset_m: 8.0,  nominal_touchdown_pitch_deg: 5.0 }
    narrowbody: { vertical_offset_m: 4.2, longitudinal_offset_m: 12.5, nominal_touchdown_pitch_deg: 5.5 }
    widebody:   { vertical_offset_m: 5.8, longitudinal_offset_m: 18.0, nominal_touchdown_pitch_deg: 4.5 }
  class_default_widens_ci: true     # Inflate distance CI to span class range + mark low-confidence

geodesy:
  geoid_model: "EGM2008"            # Convert MSL runway elevation -> HAE before any crossing
  assume_runway_elevation_datum: "MSL"  # Datum of supplied elevation if untagged

vertical_crossing:
  fit_region_upper_ft: 250          # Fit glideslope+flare from here down (NOT flare-only <50 ft)
  fit_region_lower_ft: 0
  min_samples_in_fit_region: 3
  residual_bias_trigger_ft: 15      # Estimate residual sensor bias only above this, from high-approach samples

sources:                            # Capability descriptors gate which estimators run
  aireon:
    has_geometric_altitude: true
    samples_are_raw: true
    async_timestamps: true
  fr24:
    has_geometric_altitude: false   # ASSUMPTION — flip once confirmed
    samples_are_raw: false          # ASSUMPTION — provider-interpolated
    async_timestamps: false

validation:
  primary_split_key: "tail"         # Leakage control (headline metrics)
  generalization_evals: ["airport", "runway"]  # Reported separately, not intersected
  use_calibration_split: true       # Three-way train/calibration/test for interval calibration
  train_fraction: 0.70              # Group-population fraction assigned to train (grouped by primary_split_key)
  calibration_fraction: 0.15        # Group-population fraction reserved for interval calibration (disjoint from train/test)
  test_fraction: 0.15               # Group-population fraction held out for headline test metrics
  min_stratum_size: 30
  cross_source: true
  approach_speed_band_edges_kt: [120.0, 140.0, 160.0]  # Report-only bands: <120 / 120-140 / 140-160 / >=160 kt (Req 12.7)
  coverage_min: 0.85                 # Empirical-coverage acceptance band lower edge for 90% CIs (Req 4.3, 4.4); below = undercovered/unsafe
  coverage_max: 0.95                 # Acceptance band upper edge; above = overcovered/uninformative
  below_target_min_flights: 200      # Min flights before a stratum is flagged below-target (Req 13.5; distinct from the 30-flight reporting gate)
  provisional_targets:               # PROVISIONAL reporting targets (Req 13); flagged, never hard-failed, until ratified vs the cadence floor (Req 13.0)
    distance_rmse_ft: 250            # Overall along-runway RMSE target (Req 13.1)
    distance_p95_abs_error_ft: 400   # 95th-percentile absolute error target (Req 13.3)
    distance_p95_long_side_ft: 500   # 95th-percentile positive/long-side signed error cap (Req 13.3)
    median_signed_error_abs_ft: 75   # |median signed error| bias cap per type (Req 13.2)
    baseline_improvement_pct: 30     # Minimum RMSE reduction vs naive baseline (Req 13.4)
  clock_offset_max_s: 2.0            # Time-domain exclusion only; confirm vs observed distribution
  clock_drift_max_s: 1.0
  clock_xcorr_resample_dt_s: 0.1     # Common-grid resample step for kinematic cross-correlation (s)
  clock_max_lag_search_s: 10.0       # Max absolute lag searched during cross-correlation (s)
  clock_min_overlap_s: 20.0          # Minimum overlapping series duration for a reliable estimate (s)
  clock_min_peak_correlation: 0.5    # Minimum normalized cross-correlation peak to trust an estimate
  clock_drift_segments: 3            # Sub-windows used to detect within-flight clock drift
  wrong_runway_lateral_margin_ft: 50 # + runway half-width before flagging suspected wrong runway

output:
  distance_units: "feet"
  speed_units: "knots"
  time_precision_decimals: 3
  speed_min_kt: 50.0                  # Plausible touchdown-speed lower bound (Req 3.1)
  speed_max_kt: 220.0                 # Plausible touchdown-speed upper bound (Req 3.1)
  speed_resolution_kt: 0.1            # Reported groundspeed resolution (Req 3.1)
  speed_velocity_gap_max_s: 10.0      # Flag speed low-confidence if no velocity sample within this window of t_td (Req 3.4)
